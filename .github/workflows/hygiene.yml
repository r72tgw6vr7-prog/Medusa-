name: Hygiene

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  hygiene:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Hygiene checks
        run: npm run hygiene

      - name: Upload hygiene report artifacts (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hygiene-audit
          path: |
            HYGIENE_AUDIT.md
            FOLDER_RULES.md
            .eslintrc-hygiene.js
            scripts/check-hygiene.sh
